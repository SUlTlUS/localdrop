name: localdrop
description: "LAN file transfer app with Liquid Glass design"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  liquid_glass_widgets:
    path: C:/IDE/Android/liquid_glass_widgets
  file_picker: ^8.0.0
  provider: ^6.1.0
  path_provider: ^2.1.0
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
